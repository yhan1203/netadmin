<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>netadmin Dashboard</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        /* ── Design System ─────────────────────────────── */
        :root {
            --bg-primary: #0f1117;
            --bg-secondary: #1a1d27;
            --bg-card: #1e2230;
            --bg-hover: #252a3a;
            --border: #2a2f42;
            --text-primary: #e1e4ed;
            --text-secondary: #8b90a0;
            --text-dim: #5a5f72;
            --accent: #6c8cff;
            --accent-glow: rgba(108, 140, 255, 0.15);
            --green: #34d399;
            --yellow: #fbbf24;
            --red: #f87171;
            --radius: 8px;
            --radius-lg: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        /* ── Layout ──────────────────────────────────── */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(8px);
        }
        header .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 { font-size: 1.25rem; font-weight: 600; }
        header h1 span { color: var(--accent); }
        nav { display: flex; gap: 24px; }
        nav a {
            color: var(--text-secondary);
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.15s;
        }
        nav a:hover { color: var(--text-primary); text-decoration: none; }
        .badge {
            display: inline-block;
            background: var(--accent-glow);
            color: var(--accent);
            font-size: 0.7rem;
            padding: 1px 8px;
            border-radius: 99px;
            margin-left: 4px;
        }

        /* ── Cards ───────────────────────────────────── */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 20px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .card:hover {
            border-color: var(--accent);
            box-shadow: 0 0 20px var(--accent-glow);
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .card-header h3 { font-size: 1rem; }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        /* ── Status indicators ───────────────────────── */
        .status { font-size: 0.85rem; padding: 2px 10px; border-radius: 99px; font-weight: 500; }
        .status-ok { background: rgba(52, 211, 153, 0.12); color: var(--green); }
        .status-warn { background: rgba(251, 191, 36, 0.12); color: var(--yellow); }
        .status-err { background: rgba(248, 113, 113, 0.12); color: var(--red); }
        .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
        .dot-ok { background: var(--green); }
        .dot-warn { background: var(--yellow); }
        .dot-err { background: var(--red); }

        /* ── Metric rows ─────────────────────────────── */
        .metric { display: flex; justify-content: space-between; padding: 6px 0; font-size: 0.9rem; }
        .metric-label { color: var(--text-secondary); }
        .metric-value { font-weight: 500; font-variant-numeric: tabular-nums; }
        .metric + .metric { border-top: 1px solid var(--border); }

        /* ── Tables ──────────────────────────────────── */
        .table-wrap { overflow-x: auto; margin-top: 16px; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; padding: 10px 12px; color: var(--text-secondary); font-weight: 500; border-bottom: 1px solid var(--border); }
        td { padding: 10px 12px; border-bottom: 1px solid var(--border); }
        tr:hover td { background: var(--bg-hover); }
        .clickable-row { cursor: pointer; }

        /* ── Buttons / Forms ─────────────────────────── */
        .btn {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 6px 16px; border-radius: var(--radius);
            font-size: 0.85rem; font-weight: 500;
            border: 1px solid var(--border);
            background: var(--bg-card);
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.12s;
        }
        .btn:hover { border-color: var(--accent); background: var(--bg-hover); }
        .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
        .btn-primary:hover { background: #5a7ae6; }
        .btn-danger { color: var(--red); }
        .btn-danger:hover { border-color: var(--red); background: rgba(248,113,113,0.08); }
        .btn-sm { padding: 4px 10px; font-size: 0.8rem; }

        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 4px; }
        .form-group input {
            width: 100%; padding: 8px 12px; border-radius: var(--radius);
            border: 1px solid var(--border); background: var(--bg-primary);
            color: var(--text-primary); font-size: 0.9rem;
            outline: none; transition: border-color 0.12s;
        }
        .form-group input:focus { border-color: var(--accent); }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }

        /* ── Page sections ───────────────────────────── */
        .page-header { margin-bottom: 24px; }
        .page-header h2 { font-size: 1.5rem; }
        .page-header p { color: var(--text-secondary); font-size: 0.9rem; margin-top: 4px; }
        .section { margin-top: 32px; }
        .section-title { font-size: 1.1rem; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

        /* ── Config content ──────────────────────────── */
        .config-content, .diff-content {
            background: #0d1117; padding: 16px; border-radius: var(--radius);
            overflow-x: auto; font-size: 0.8rem; font-family: "JetBrains Mono", "Fira Code", monospace;
            max-height: 600px; overflow-y: auto;
            border: 1px solid var(--border);
        }
        .error { color: var(--red); padding: 12px; background: rgba(248,113,113,0.06); border-radius: var(--radius); border: 1px solid rgba(248,113,113,0.2); }
        .info { color: var(--yellow); padding: 12px; background: rgba(251,191,36,0.06); border-radius: var(--radius); border: 1px solid rgba(251,191,36,0.2); }

        /* ── Loading ─────────────────────────────────── */
        .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { color: var(--text-dim); font-size: 0.85rem; display: flex; align-items: center; gap: 8px; padding: 24px; justify-content: center; }

        /* ── Responsive ──────────────────────────────── */
        @media (max-width: 768px) {
            header .container { flex-direction: column; gap: 12px; }
            .card-grid { grid-template-columns: 1fr; }
            .form-row { flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <div class="container">
        <h1><span>net</span>admin</h1>
        <nav>
            <a href="/">仪表盘</a>
            <a href="/backups">备份 <span class="badge">list</span></a>
            <a href="/schedules">调度 <span class="badge">cron</span></a>
        </nav>
    </div>
</header>

<main class="container" style="padding-top: 32px; padding-bottom: 64px;">
    {% block content %}{% endblock %}
</main>

</body>
</html>
