name: Feature Request
description: 建议一个新功能
title: "[Feature] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        ## 感谢你的建议！

  - type: textarea
    id: problem
    attributes:
      label: 解决了什么问题
      description: 你遇到了什么场景？为什么需要这个功能？
      placeholder: "我每次都要手动做 XXX，希望工具能自动..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的方案
      description: 你希望怎么解决？
      placeholder: "希望加一个命令 netadmin xxx ..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 你尝试过其他方式解决吗？

  - type: dropdown
    id: vendor
    attributes:
      label: 适用厂商
      description: 这个功能是针对哪个厂商的？
      options:
        - 通用（华为+思科）
        - 仅华为
        - 仅思科