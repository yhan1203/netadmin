# netadmin 设备清单
# 把要管理的设备写在这里

devices:
  # 示例 — 华为交换机
  - host: 192.168.1.1
    name: core-sw-a
    vendor: huawei                   # huawei | cisco
    device_type: huawei              # netmiko device_type
    port: 22
    username: admin
    password: ""                     # 留空则在运行时提示

  # 示例 — 思科交换机
  - host: 192.168.1.2
    name: access-sw-b
    vendor: cisco
    device_type: cisco_ios
    port: 22
    username: admin
    password: ""

# 全局默认凭证（设备没配时用这个）
defaults:
  username: admin
  password: ""
  port: 22
  timeout: 30

# 备份目录
backup_dir: ./backups

# 数据库路径
db_path: ./netadmin.db